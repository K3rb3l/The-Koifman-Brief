runConfig:
  concurrency: 80
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 4

env:
  - variable: BUTTONDOWN_API_KEY
    secret: buttondown-api-key

  - variable: KEYSTATIC_GITHUB_CLIENT_ID
    value: Iv23liF9p9Eg5YhBx3V5
    availability:
      - BUILD
      - RUNTIME

  - variable: KEYSTATIC_GITHUB_CLIENT_SECRET
    secret: keystatic-github-client-secret
    availability:
      - BUILD
      - RUNTIME

  - variable: KEYSTATIC_SECRET
    secret: keystatic-secret
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_KEYSTATIC_GITHUB_APP_SLUG
    value: the-koifman-brief-cms
    availability:
      - BUILD
      - RUNTIME
